<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Pet Prop</title>
    <style>
      :root {
        --prop-visual-left: 20px;
        --prop-visual-top: 20px;
        --prop-visual-width: 156px;
        --prop-visual-height: 112px;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      }

      .prop-root {
        position: relative;
        width: 100%;
        height: 100%;
        cursor: grab;
        user-select: none;
        overflow: hidden;
      }

      .prop-root.is-dragging {
        cursor: grabbing;
      }

      .return-button {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 3;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid rgba(171, 213, 255, 0.22);
        border-radius: 999px;
        background: rgba(9, 14, 20, 0.82);
        color: #eff6ff;
        font: inherit;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .prop-shadow {
        position: absolute;
        left: calc(var(--prop-visual-left) + 14px);
        width: calc(var(--prop-visual-width) - 28px);
        bottom: 20px;
        height: 18px;
        border-radius: 50%;
        background: rgba(4, 8, 14, 0.24);
        filter: blur(8px);
      }

      .prop-visual {
        position: absolute;
        left: var(--prop-visual-left);
        top: var(--prop-visual-top);
        width: var(--prop-visual-width);
        height: var(--prop-visual-height);
        background-image: url("assets/overlays/pool-ring-sheet.svg");
        background-repeat: no-repeat;
        background-position: 0 0;
        background-size: 400% 100%;
        filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.22));
        transform-origin: center bottom;
        animation: prop-float 2.6s ease-in-out infinite;
      }

      .prop-root.is-dragging .prop-visual {
        animation-play-state: paused;
      }

      @keyframes prop-float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-3px);
        }
      }
    </style>
  </head>
  <body>
    <main id="prop-root" class="prop-root" aria-label="Desktop prop">
      <button id="return-button" class="return-button" type="button">Return</button>
      <div class="prop-shadow" aria-hidden="true"></div>
      <div id="prop-visual" class="prop-visual" aria-hidden="true"></div>
    </main>
    <script src="prop-window-renderer.js"></script>
  </body>
</html>
